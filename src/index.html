<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Insights Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      h1 {
        font-family: "Lexend Deca", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#090b1a] flex items-center justify-center min-h-screen p-6">
    <main
      class="flex flex-col-reverse md:flex-row bg-[#1b1938] rounded-xl overflow-hidden max-w-[1110px] w-full min-h-[446px] shadow-2xl"
    >
      <div
        class="flex-1 p-8 md:p-16 flex flex-col justify-center text-center md:text-left"
      >
        <h1
          class="text-white text-3xl md:text-4xl font-bold mb-6 leading-tight"
        >
          Get <span class="text-[#aa5cdb]">insights</span> that help your
          business grow.
        </h1>

        <p
          class="text-gray-400 text-base md:text-lg mb-10 leading-relaxed opacity-75"
        >
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>

        <div
          class="flex flex-col md:flex-row justify-between gap-8 mt-4 uppercase"
        >
          <div class="flex flex-col">
            <span class="text-white text-2xl font-bold">10k+</span>
            <span
              class="text-gray-400 text-[10px] tracking-[0.2em] mt-1 font-bold"
              >Companies</span
            >
          </div>
          <div class="flex flex-col">
            <span class="text-white text-2xl font-bold">314</span>
            <span
              class="text-gray-400 text-[10px] tracking-[0.2em] mt-1 font-bold"
              >Templates</span
            >
          </div>
          <div class="flex flex-col">
            <span class="text-white text-2xl font-bold">12M+</span>
            <span
              class="text-gray-400 text-[10px] tracking-[0.2em] mt-1 font-bold"
              >Queries</span
            >
          </div>
        </div>
      </div>

      <div class="flex-1 relative min-h-[250px] md:min-h-full">
        <div
          class="absolute inset-0 bg-[#aa5cdb] opacity-60 mix-blend-multiply"
        ></div>
        <img
          src="./imgs/Bitmap.png"
          alt="Working Team"
          class="w-full h-full object-cover"
        />
      </div>
    </main>
  </body>
</html>
